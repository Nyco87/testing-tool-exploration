name: E2E Tests
on:
  workflow_dispatch:

jobs:
  e2e-test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-node@v6
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run E2E setup + tests
      run: npx playwright test --project=setup --project=e2e
      env:
        DEEZER_EMAIL: ${{ secrets.DEEZER_EMAIL }}
        DEEZER_PASSWORD: ${{ secrets.DEEZER_PASSWORD }}
    - uses: actions/upload-artifact@v7
      if: ${{ !cancelled() }}
      with:
        name: allure-results-e2e
        path: allure-results/
        retention-days: 15
  publish-e2e-report:
    needs: e2e-test
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
    - uses: actions/download-artifact@v8
      with:
        name: allure-results-e2e
        path: allure-results/
    - uses: actions/checkout@v7
      with:
        ref: gh-pages
        path: gh-pages
    - name: Copy Allure history
      run: cp -r gh-pages/history allure-results/history || true
    - name: Setup Java for Allure
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '21'
    - name: Install Allure
      run: npm install -g allure-commandline
    - name: Generate Allure report
      run: allure generate allure-results --clean -o allure-report
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./allure-report
        destination_dir: e2e