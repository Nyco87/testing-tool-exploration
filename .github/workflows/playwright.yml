name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  enforce-allure-ids:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
    - uses: actions/checkout@v7
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        ref: ${{ github.head_ref }}
    - uses: actions/setup-node@v6
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Enforce Allure IDs
      run: npx ts-node scripts/analyze-specs.ts
    - name: Commit missing Allure IDs
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add tests/
        git diff --cached --quiet || git commit -m "chore: add missing allure ids [skip ci]"
        git push
  generate-fixtures:
    needs: enforce-allure-ids
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-node@v6
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Generate AI fixtures
      run: npm run generate:fixtures
    - uses: actions/upload-artifact@v7
      with:
        name: ai-fixtures
        path: fixtures/ai-generated-search-cases.json
        retention-days: 15
  playwright-test:
    needs: generate-fixtures
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: actions/download-artifact@v8
      with:
        name: ai-fixtures
        path: fixtures/
    - uses: actions/setup-node@v6
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
    - uses: actions/upload-artifact@v7
      if: ${{ !cancelled() }}
      with:
        name: allure-results
        path: allure-results/
        retention-days: 15
  publish-report:
    needs: playwright-test
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
    - uses: actions/download-artifact@v8
      with:
        name: allure-results
        path: allure-results/
    - uses: actions/checkout@v7
      with:
        ref: gh-pages
        path: gh-pages
    - name: Copy Allure history
      run: cp -r gh-pages/history allure-results/history || true
    - name: Setup Java for Allure
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '21'
    - name: Install Allure
      run: npm install -g allure-commandline
    - name: Generate Allure report
      run: allure generate allure-results --clean -o allure-report
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./allure-report